<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Care</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", sans-serif; background: #f4f9f4; color: #1a2e1a; }
    .app { min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .header { background: linear-gradient(135deg, #e8f5e9 0%, #e0f2f1 60%, #c8e6c9 100%); border-bottom: 2px solid #81c784; }
    .header-content { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }
    .header-top { display: flex; align-items: center; gap: 16px; justify-content: space-between; }
    .logo { font-size: 2.4rem; }
    .header-text { text-align: center; flex: 1; }
    .site-title { font-size: 2.2rem; font-weight: 800; letter-spacing: 0.14em; color: #2e7d32; text-transform: uppercase; text-shadow: 0 1px 3px rgba(46,125,50,0.12); }
    .site-tagline { font-size: 0.95rem; color: #558b2f; margin-top: 4px; letter-spacing: 0.04em; }
    .cart-icon { font-size: 1.5rem; cursor: pointer; background: white; border: 2px solid #81c784; border-radius: 50px; padding: 6px 14px; display: flex; align-items: center; gap: 6px; transition: background 0.2s; user-select: none; }
    .cart-icon:hover { background: #e8f5e9; }
    .cart-count { font-size: 1rem; font-weight: 700; color: #2e7d32; min-width: 20px; }

    /* Top Nav */
    .top-nav { background: #f1f8e9; border-bottom: 2px solid #c5e1a5; display: flex; flex-wrap: wrap; justify-content: center; padding: 0 16px; overflow-x: auto; }
    .nav-btn { background: none; border: none; border-bottom: 3px solid transparent; padding: 14px 18px; font-size: 0.88rem; font-weight: 600; color: #388e3c; cursor: pointer; white-space: nowrap; transition: color 0.2s, border-color 0.2s, background 0.2s; letter-spacing: 0.02em; }
    .nav-btn:hover { color: #1b5e20; background: #dcedc8; }
    .nav-btn.active { color: #1b5e20; border-bottom-color: #2e7d32; background: #dcedc8; }

    /* Body Layout */
    .body-layout { flex: 1; display: flex; max-width: 1200px; margin: 24px auto; width: 100%; padding: 0 16px; gap: 24px; }

    /* Sidebar */
    .sidebar { width: 220px; flex-shrink: 0; background: white; border-radius: 16px; border: 1.5px solid #c5e1a5; padding: 20px 0; height: fit-content; box-shadow: 0 2px 12px rgba(46,125,50,0.07); }
    .sidebar-title { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #558b2f; padding: 0 20px 12px; border-bottom: 1.5px solid #c5e1a5; margin-bottom: 8px; }
    .sidebar-list { list-style: none; }
    .sidebar-btn { display: block; width: 100%; background: none; border: none; border-left: 3px solid transparent; text-align: left; padding: 10px 20px; font-size: 0.9rem; color: #33691e; cursor: pointer; transition: background 0.15s, color 0.15s, padding-left 0.15s; }
    .sidebar-btn:hover { background: #f1f8e9; color: #1b5e20; padding-left: 26px; }
    .sidebar-btn.active { background: #dcedc8; color: #1b5e20; font-weight: 700; border-left-color: #2e7d32; padding-left: 26px; }

    /* Main */
    .main-content { flex: 1; min-width: 0; }
    .section-header { margin-bottom: 20px; display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
    .section-title { font-size: 1.5rem; font-weight: 800; color: #2e7d32; }
    .section-subtitle { font-size: 0.85rem; color: #558b2f; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }

    /* Product Card */
    .product-card { background: white; border-radius: 16px; border: 1.5px solid #c5e1a5; overflow: hidden; box-shadow: 0 2px 10px rgba(46,125,50,0.07); display: flex; flex-direction: column; transition: transform 0.2s, box-shadow 0.2s; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(46,125,50,0.14); }
    .product-img { background: linear-gradient(135deg, #e8f5e9 0%, #e0f7fa 100%); height: 130px; display: flex; align-items: center; justify-content: center; }
    .product-emoji { font-size: 3.2rem; user-select: none; }
    .product-info { padding: 14px 14px 8px; flex: 1; }
    .product-name { font-size: 0.88rem; font-weight: 600; color: #1a2e1a; line-height: 1.4; margin-bottom: 6px; }
    .product-price { font-size: 1rem; font-weight: 800; color: #2e7d32; }
    .add-to-cart-btn { margin: 0 14px 14px; padding: 9px 0; background: linear-gradient(90deg, #66bb6a, #26a69a); color: white; border: none; border-radius: 50px; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.1s, background 0.3s; letter-spacing: 0.03em; }
    .add-to-cart-btn:hover { opacity: 0.9; transform: scale(1.02); }
    .add-to-cart-btn.added { background: linear-gradient(90deg, #29b6f6, #1976d2); }

    /* Footer */
    .footer { background: #f1f8e9; border-top: 1.5px solid #c5e1a5; text-align: center; padding: 18px; font-size: 0.85rem; color: #558b2f; }
    .footer a { color: #2e7d32; text-decoration: none; font-weight: 600; }
    .footer a:hover { text-decoration: underline; }

    /* Responsive */
    @media (max-width: 768px) {
      .site-title { font-size: 1.4rem; }
      .body-layout { flex-direction: column; margin: 16px auto; }
      .sidebar { width: 100%; }
      .sidebar-list { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 12px 12px; }
      .sidebar-btn { width: auto; border: 1.5px solid #c5e1a5; border-left: 1.5px solid #c5e1a5; border-radius: 50px; padding: 7px 16px; font-size: 0.82rem; }
      .sidebar-btn.active { padding-left: 16px; border-color: #2e7d32; }
      .products-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
      .nav-btn { padding: 12px 12px; font-size: 0.8rem; }
    }
  </style>
</head>

      btn.classList.remove('added');
    }, 1500);
