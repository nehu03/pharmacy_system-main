    .site-tagline { font-size: 0.95rem; color: #1565c0; margin-top: 4px; }
    .cart-icon { font-size: 1.5rem; cursor: pointer; background: white; border: 2px solid #1976d2; border-radius: 50px; padding: 6px 14px; display: flex; align-items: center; gap: 6px; user-select: none; }

    .cart-count { font-size: 1rem; font-weight: 700; color: #0d47a1; }

    .nav-btn.active { color: #0d47a1; border-bottom-color: #0d47a1; background: #bbdefb; }
    .body-layout { flex: 1; display: flex; max-width: 1200px; margin: 24px auto; width: 100%; padding: 0 16px; gap: 24px; }
    .sidebar { width: 220px; flex-shrink: 0; background: white; border-radius: 16px; border: 1.5px solid #90caf9; padding: 20px 0; height: fit-content; box-shadow: 0 2px 12px rgba(13,71,161,0.07); }
    .sidebar-title { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #1565c0; padding: 0 20px 12px; border-bottom: 1.5px solid #90caf9; margin-bottom: 8px; }
    .sidebar-list { list-style: none; }
    .sidebar-btn { display: block; width: 100%; background: none; border: none; border-left: 3px solid transparent; text-align: left; padding: 10px 20px; font-size: 0.9rem; color: #1565c0; cursor: pointer; transition: background 0.15s, color 0.15s, padding-left 0.15s; }
    .sidebar-btn:hover { background: #e3f0ff; color: #0d47a1; padding-left: 26px; }
    .sidebar-btn.active { background: #bbdefb; color: #0d47a1; font-weight: 700; border-left-color: #0d47a1; padding-left: 26px; }
    .main-content { flex: 1; min-width: 0; }
    .section-header { margin-bottom: 20px; display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
    .section-title { font-size: 1.5rem; font-weight: 800; color: #0d47a1; }
    .section-subtitle { font-size: 0.85rem; color: #1565c0; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    .product-card { background: white; border-radius: 16px; border: 1.5px solid #90caf9; overflow: hidden; box-shadow: 0 2px 10px rgba(13,71,161,0.07); display: flex; flex-direction: column; transition: transform 0.2s, box-shadow 0.2s; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(13,71,161,0.15); }
    .product-img { background: linear-gradient(135deg, #e3f0ff 0%, #e8f4fd 100%); height: 130px; display: flex; align-items: center; justify-content: center; }
    .product-emoji { font-size: 3.2rem; user-select: none; }
    .product-info { padding: 14px 14px 8px; flex: 1; }
    .product-name { font-size: 0.88rem; font-weight: 600; color: #0d1a2e; line-height: 1.4; margin-bottom: 6px; }
    .product-price { font-size: 1rem; font-weight: 800; color: #0d47a1; }
    .add-to-cart-btn { margin: 0 14px 14px; padding: 9px 0; background: linear-gradient(90deg, #1976d2, #0288d1); color: white; border: none; border-radius: 50px; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.1s, background 0.3s; }

    .add-to-cart-btn.added { background: linear-gradient(90deg, #66bb6a, #43a047); }
    .footer { background: #e3f0ff; border-top: 1.5px solid #90caf9; text-align: center; padding: 18px; font-size: 0.85rem; color: #1565c0; }
    @media (max-width: 768px) {
      .site-title { font-size: 1.3rem; }

      .sidebar { width: 100%; }
      .sidebar-list { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 12px 12px; }

      .sidebar-btn.active { padding-left: 16px; border-color: #0d47a1; }
      .products-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
      .nav-btn { padding: 12px 10px; font-size: 0.8rem; }
    }

    "Back Support": "🧍",

  };

  const categories = Object.keys(data);
  let activeCategory = categories[0];
  let activeSub = Object.keys(data[activeCategory])[0];
  let cartCount = 0;

  function render() {
    document.getElementById('topNav').innerHTML = categories.map(cat =>
      `<button class="nav-btn${activeCategory===cat?' active':''}" onclick="selectCategory('${cat.replace(/&/g,'__AMP__').replace(/'/g,"\\'")}')">${emojiMap[cat]||'🦴'} ${cat}</button>`
    ).join('');
    const subs = Object.keys(data[activeCategory]);
    document.getElementById('sidebarList').innerHTML = subs.map(sub =>
      `<li><button class="sidebar-btn${activeSub===sub?' active':''}" onclick="selectSub('${sub.replace(/'/g,"\\'")}')">${sub}</button></li>`
    ).join('');
    const products = data[activeCategory][activeSub];
    document.getElementById('sectionTitle').textContent = activeSub;
    document.getElementById('sectionSubtitle').textContent = products.length + ' products found';
    document.getElementById('productsGrid').innerHTML = products.map((p, i) =>
      `<div class="product-card">
        <div class="product-img"><span class="product-emoji">${emojiMap[activeCategory]||'🦴'}</span></div>

      </div>`
    ).join('');
    document.getElementById('cartCount').textContent = cartCount;
  }

  function selectCategory(cat) {
    activeCategory = cat.replace(/__AMP__/g, '&');
    activeSub = Object.keys(data[activeCategory])[0];
    render();
  }
  function selectSub(sub) { activeSub = sub; render(); }
  function addToCart(i) {
    cartCount++;
    document.getElementById('cartCount').textContent = cartCount;
    const btn = document.getElementById('btn-'+i);
    btn.textContent = '✓ Added!'; btn.classList.add('added');
    setTimeout(() => { btn.textContent = 'Add to Cart'; btn.classList.remove('added'); }, 1500);
  }
